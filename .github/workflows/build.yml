name: build

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm install
      - name: Lint extension (web-ext)
        run: npx web-ext lint --source-dir=extension --self-hosted
      - name: Build .zip
        run: npx web-ext build --source-dir=extension --artifacts-dir=dist --overwrite-dest
      - uses: actions/upload-artifact@v4
        with:
          name: ksp-llm-extension
          path: dist/*.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm install
      - run: npx web-ext build --source-dir=extension --artifacts-dir=dist --overwrite-dest
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
