<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KSP × LLM — Wireframe Exploration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <style>
    body { margin: 0; background: #f0ece6; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard, DCPostIt } = window;

/* ─── tokens ─────────────────────────────────────────────── */
const C = {
  bg: '#ffffff', ink: '#1a1917', muted: '#8a8480',
  subtle: '#f5f2ee', border: '#d8d3cc',
  blue: '#4a6cf7', yellow: '#f5c84a',
  red: '#d94f3f', green: '#1f9c6a',
  stripe: 'repeating-linear-gradient(135deg,#dedad3 0,#dedad3 1px,#efebe4 1px,#efebe4 9px)'
};
const hb  = { fontFamily: "'Assistant', 'Segoe UI', sans-serif" };
const cv  = { fontFamily: "'Caveat', cursive" };
const mono = { fontFamily: "'Courier New', monospace" };

/* ─── primitives ─────────────────────────────────────────── */

function Chip({ label, color = C.blue }) {
  return (
    <span style={{ ...hb, fontSize: 10, padding: '2px 8px',
      background: color + '1a', color,
      border: `1px solid ${color}40`, borderRadius: 20 }}>
      {label}
    </span>
  );
}

function WFBtn({ label, primary, ghost, small, full, style }) {
  return (
    <div style={{
      padding: small ? '5px 11px' : '9px 16px',
      border: primary ? `1.5px solid ${C.blue}` : ghost ? `1.5px dashed ${C.border}` : `1.5px solid ${C.ink}`,
      borderRadius: 5,
      background: primary ? C.blue : C.bg,
      color: primary ? '#fff' : C.ink,
      ...hb, fontSize: small ? 11 : 13, fontWeight: 600,
      textAlign: 'center', cursor: 'pointer',
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 5,
      width: full ? '100%' : undefined, boxSizing: 'border-box', ...style
    }}>
      {label}
    </div>
  );
}

function WFInput({ placeholder, multiline, h = 32, style }) {
  return (
    <div style={{
      width: '100%', height: multiline ? undefined : h,
      minHeight: multiline ? 66 : undefined,
      border: `1.5px solid ${C.border}`, borderRadius: 5,
      background: C.bg, padding: '7px 10px', boxSizing: 'border-box',
      ...hb, fontSize: 12, color: C.muted, direction: 'rtl',
      lineHeight: 1.5, ...style
    }}>
      {placeholder}
    </div>
  );
}

function WFSelect({ label }) {
  return (
    <div style={{
      width: '100%', height: 32, border: `1.5px solid ${C.border}`,
      borderRadius: 5, background: C.bg, padding: '0 10px',
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      ...hb, fontSize: 12, color: C.ink, direction: 'rtl', boxSizing: 'border-box'
    }}>
      <span>{label}</span>
      <span style={{ color: C.muted, fontSize: 10 }}>▾</span>
    </div>
  );
}

function Skel({ w, h, style }) {
  return (
    <div style={{
      width: w, height: h, borderRadius: 3,
      background: 'linear-gradient(90deg,#e2ddd6 25%,#eee9e1 50%,#e2ddd6 75%)',
      backgroundSize: '200% 100%', ...style
    }} />
  );
}

function HR({ my = 10 }) {
  return <div style={{ height: 1, background: C.border, margin: `${my}px 0` }} />;
}

function Note({ text, color = '#e55a00', style }) {
  return (
    <span style={{ ...cv, fontSize: 11.5, color, ...style }}>{text}</span>
  );
}

/* ─── tab bar ───────────────────────────────────────────── */
function TabBar({ active = 0, pos = 'top' }) {
  const tabs = ['מוצרים', 'שאל AI', 'הגדרות'];
  const icons = ['📦', '🤖', '⚙️'];
  const isTop = pos === 'top';
  return (
    <div style={{
      display: 'flex', direction: 'rtl',
      background: '#faf8f5',
      borderBottom: isTop ? `1.5px solid ${C.border}` : 'none',
      borderTop: !isTop ? `1.5px solid ${C.border}` : 'none',
    }}>
      {tabs.map((t, i) => (
        <div key={i} style={{
          flex: 1, textAlign: 'center',
          padding: isTop ? '8px 4px 7px' : '7px 4px 8px',
          ...hb, fontSize: 12,
          fontWeight: i === active ? 700 : 400,
          color: i === active ? C.blue : C.muted,
          borderBottom: isTop && i === active ? `2px solid ${C.blue}` : isTop ? '2px solid transparent' : 'none',
          borderTop: !isTop && i === active ? `2px solid ${C.blue}` : !isTop ? '2px solid transparent' : 'none',
          borderRight: i < 2 ? `1px solid ${C.border}` : 'none',
          cursor: 'pointer',
        }}>
          {!isTop && <div style={{ fontSize: 17, lineHeight: 1.2 }}>{icons[i]}</div>}
          <div>{t}</div>
        </div>
      ))}
    </div>
  );
}

/* ─── popup shell ─────────────────────────────────────────── */
function Shell({ children, w = 380, nav = 'top', active = 0, sizeLabel }) {
  const tabs = ['מוצרים', 'שאל AI', 'הגדרות'];
  const icons = ['📦', '🤖', '⚙️'];
  return (
    <div style={{
      width: w, border: `2px solid ${C.ink}`, borderRadius: 8,
      overflow: 'hidden', background: C.bg,
      boxShadow: `3px 3px 0 ${C.ink}`,
    }}>
      {/* chrome header */}
      <div style={{
        background: C.ink, padding: '9px 12px',
        display: 'flex', alignItems: 'center',
        justifyContent: 'space-between', direction: 'rtl', gap: 8
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ ...hb, fontSize: 14, fontWeight: 700, color: '#fff', letterSpacing: -0.3 }}>✨ KSP × AI</span>
          {sizeLabel && <span style={{ ...cv, fontSize: 10, color: '#888' }}>{sizeLabel}</span>}
        </div>
        <span style={{ color: '#666', fontSize: 13, lineHeight: 1 }}>✕</span>
      </div>

      {/* top tabs */}
      {nav === 'top' && <TabBar active={active} pos="top" />}

      {/* side tabs */}
      {nav === 'side' && (
        <div style={{ display: 'flex', direction: 'rtl' }}>
          <div style={{ width: 68, background: '#faf8f5', borderLeft: `1.5px solid ${C.border}`, flexShrink: 0 }}>
            {tabs.map((t, i) => (
              <div key={i} style={{
                padding: '13px 6px', textAlign: 'center',
                ...hb, fontSize: 10, fontWeight: i === active ? 700 : 400,
                color: i === active ? C.blue : C.muted,
                borderLeft: i === active ? `2.5px solid ${C.blue}` : '2.5px solid transparent',
                borderBottom: `1px solid ${C.border}`, cursor: 'pointer',
              }}>
                <div style={{ fontSize: 18, marginBottom: 2 }}>{icons[i]}</div>
                {t}
              </div>
            ))}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>{children}</div>
        </div>
      )}

      {/* content */}
      {nav !== 'side' && <div>{children}</div>}

      {/* bottom nav */}
      {nav === 'bottom' && <TabBar active={active} pos="bottom" />}
    </div>
  );
}

/* ─── product table ──────────────────────────────────────── */
const PRODUCTS = [
  { name: 'Samsung Galaxy S24', brand: 'Samsung', price: '₪3,499', eilat: '₪3,199' },
  { name: 'iPhone 15 Pro 128GB', brand: 'Apple',   price: '₪5,299', eilat: '₪4,999' },
  { name: 'Google Pixel 8 Pro',  brand: 'Google',  price: '₪2,799', eilat: '₪2,599' },
  { name: 'OnePlus 12 256GB',    brand: 'OnePlus', price: '₪2,299', eilat: '₪2,099' },
];

function ProductTable({ rows = 3, compact }) {
  const pr = compact ? '5px 8px' : '7px 8px';
  return (
    <div style={{ border: `1.5px solid ${C.border}`, borderRadius: 4, overflow: 'hidden', direction: 'rtl' }}>
      <div style={{
        display: 'grid', gridTemplateColumns: '2fr 1.1fr 1fr 1fr 18px',
        background: C.subtle, borderBottom: `1.5px solid ${C.border}`,
        padding: pr, gap: 4,
      }}>
        {['שם', 'מותג', 'מחיר', 'אילת', ''].map((h, i) => (
          <span key={i} style={{ ...hb, fontSize: 10, fontWeight: 700, color: C.muted }}>{h}</span>
        ))}
      </div>
      {PRODUCTS.slice(0, rows).map((p, i) => (
        <div key={i} style={{
          display: 'grid', gridTemplateColumns: '2fr 1.1fr 1fr 1fr 18px',
          padding: pr, gap: 4, alignItems: 'center',
          borderBottom: i < rows - 1 ? `1px solid ${C.border}` : 'none',
          background: i % 2 ? '#fbf9f6' : C.bg,
        }}>
          <span style={{ ...hb, fontSize: 11 }}>{p.name}</span>
          <span style={{ ...hb, fontSize: 11, color: C.muted }}>{p.brand}</span>
          <span style={{ ...mono, fontSize: 11, direction: 'ltr', textAlign: 'left' }}>{p.price}</span>
          <span style={{ ...mono, fontSize: 11, direction: 'ltr', textAlign: 'left', color: C.green }}>{p.eilat}</span>
          <span style={{ fontSize: 11, color: C.blue, cursor: 'pointer' }}>↗</span>
        </div>
      ))}
    </div>
  );
}

/* ─── tab content screens ────────────────────────────────── */

function ProdLoaded({ rows = 3, compact }) {
  return (
    <div style={{ padding: 12, direction: 'rtl' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
        <span style={{ ...hb, fontSize: 12, color: C.muted }}>
          נמצאו <b style={{ color: C.ink }}>{rows}</b> מוצרים
        </span>
        <Chip label="עמוד זה" color={C.green} />
      </div>
      <ProductTable rows={rows} compact={compact} />
      <div style={{ display: 'flex', gap: 5, marginTop: 10 }}>
        <WFBtn label="📋 Markdown" small style={{ flex: 1 }} />
        <WFBtn label="{} JSON" small style={{ flex: 1 }} />
        <WFBtn label="✨ פרומפט" primary small style={{ flex: 1 }} />
      </div>
    </div>
  );
}

function ProdLoading() {
  return (
    <div style={{ padding: 14, direction: 'rtl' }}>
      <div style={{ ...hb, fontSize: 12, color: C.muted, marginBottom: 14, display: 'flex', alignItems: 'center', gap: 7 }}>
        <span style={{ fontSize: 16 }}>⏳</span>
        <span>מסרק את ה-DOM...</span>
      </div>
      {[['65%','30%'],['50%','44%'],['72%','22%'],['40%','54%']].map(([a, b], i) => (
        <div key={i} style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
          <Skel w={a} h={12} />
          <Skel w={b} h={12} />
        </div>
      ))}
      <Skel w="55%" h={12} style={{ marginBottom: 8 }} />
      <Skel w="38%" h={12} />
    </div>
  );
}

function ProdEmpty() {
  return (
    <div style={{ padding: '28px 20px', textAlign: 'center', direction: 'rtl' }}>
      <div style={{ fontSize: 38, marginBottom: 10 }}>🔍</div>
      <div style={{ ...hb, fontSize: 14, fontWeight: 700, color: C.ink, marginBottom: 6 }}>לא נמצאו מוצרים</div>
      <div style={{ ...hb, fontSize: 12, color: C.muted, lineHeight: 1.6, marginBottom: 18 }}>
        ודא שאתה נמצא בעמוד קטגוריה,<br />חיפוש או מותג ב-KSP.
      </div>
      <WFBtn label="נסה שוב" style={{ margin: '0 auto' }} />
    </div>
  );
}

function ProdError() {
  return (
    <div style={{ padding: '16px 14px', direction: 'rtl' }}>
      <div style={{
        background: '#fff5f4', border: `1.5px solid ${C.red}35`,
        borderRadius: 6, padding: '14px 16px', textAlign: 'center'
      }}>
        <div style={{ fontSize: 30, marginBottom: 8 }}>⚠️</div>
        <div style={{ ...hb, fontSize: 13, fontWeight: 700, color: C.red, marginBottom: 6 }}>שגיאת חילוץ</div>
        <div style={{ ...hb, fontSize: 11, color: C.muted, lineHeight: 1.6, marginBottom: 14 }}>
          לא ניתן לקרוא את מבנה הדף.<br />ייתכן שה-DOM השתנה.
        </div>
        <WFBtn label="🔄 נסה שוב" small style={{ margin: '0 auto' }} />
      </div>
    </div>
  );
}

function AIDefault() {
  return (
    <div style={{ padding: 12, direction: 'rtl' }}>
      <div style={{ ...hb, fontSize: 11, color: C.muted, marginBottom: 5 }}>ספק AI</div>
      <WFSelect label="Claude (Anthropic)" />
      <div style={{ ...hb, fontSize: 11, color: C.muted, margin: '10px 0 5px' }}>שאלה</div>
      <WFInput placeholder="איזה מוצר הכי משתלם כאן? ענה בעברית." multiline />
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 9 }}>
        <span style={{ ...hb, fontSize: 10, color: C.muted }}>3 מוצרים יצורפו</span>
        <WFBtn label="שאל ←" primary small />
      </div>
      <HR />
      <div style={{ textAlign: 'center', ...hb, fontSize: 11, color: C.muted }}>
        תשובת ה-AI תופיע כאן...
      </div>
    </div>
  );
}

function AILoading() {
  return (
    <div style={{ padding: 12, direction: 'rtl' }}>
      <WFSelect label="Claude (Anthropic)" />
      <div style={{ margin: '8px 0', opacity: 0.45 }}>
        <WFInput placeholder="איזה מוצר הכי משתלם כאן?" multiline />
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
        <span style={{ ...hb, fontSize: 10, color: C.muted }}>שואל את Claude...</span>
        <WFBtn label="בטל" ghost small />
      </div>
      <HR my={0} />
      <div style={{ padding: '12px 0' }}>
        <div style={{ ...hb, fontSize: 11, color: C.muted, marginBottom: 9 }}>⏳ ממתין לתשובה...</div>
        {[88, 70, 80, 55, 62].map((w, i) => (
          <Skel key={i} w={`${w}%`} h={10} style={{ marginBottom: 7 }} />
        ))}
      </div>
    </div>
  );
}

function AIResponse() {
  return (
    <div style={{ padding: 12, direction: 'rtl' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 9 }}>
        <Chip label="Claude" />
        <WFBtn label="📋 העתק תשובה" small />
      </div>
      <div style={{
        background: C.subtle, borderRadius: 6,
        border: `1.5px solid ${C.border}`, padding: '11px 13px',
        ...hb, fontSize: 11.5, color: C.ink,
        lineHeight: 1.65, direction: 'rtl'
      }}>
        <div style={{ fontWeight: 700, marginBottom: 7 }}>📊 המוצר הכי משתלם:</div>
        <div style={{ marginBottom: 5 }}>📦 <b>Google Pixel 8 Pro</b> — ₪2,799</div>
        <div style={{ color: C.muted, marginBottom: 3 }}>• יחס מחיר/ביצועים: ✅ מצוין</div>
        <div style={{ color: C.muted, marginBottom: 3 }}>• מחיר אילת: ₪2,599 (חיסכון ₪200)</div>
        <div style={{ color: C.muted }}>• המלצה: לרכוש באילת</div>
      </div>
      <HR />
      <WFBtn label="שאלה חדשה ↺" full style={{ fontSize: 12 }} />
    </div>
  );
}

function AIError() {
  return (
    <div style={{ padding: 12, direction: 'rtl' }}>
      <WFSelect label="Claude (Anthropic)" />
      <div style={{ margin: '10px 0' }}>
        <WFInput placeholder="איזה מוצר הכי משתלם כאן?" multiline style={{ opacity: 0.5 }} />
      </div>
      <div style={{
        background: '#fff5f4', border: `1.5px solid ${C.red}40`,
        borderRadius: 5, padding: '10px 12px',
        ...hb, fontSize: 11, color: C.red, direction: 'rtl', lineHeight: 1.6
      }}>
        <b>⚠️ שגיאה:</b> מפתח API חסר.<br />
        <span style={{ color: C.muted }}>הגדר מפתח ב<span style={{ color: C.blue, cursor: 'pointer' }}> הגדרות →</span></span>
      </div>
    </div>
  );
}

function SettingsMini() {
  const keys = [
    { name: 'Claude', ok: true },
    { name: 'OpenAI', ok: false },
    { name: 'Gemini', ok: false },
  ];
  return (
    <div style={{ padding: 12, direction: 'rtl' }}>
      <div style={{ ...hb, fontSize: 10, fontWeight: 700, color: C.muted, letterSpacing: 0.6, textTransform: 'uppercase', marginBottom: 9 }}>מפתחות API</div>
      {keys.map(({ name, ok }) => (
        <div key={name} style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          padding: '7px 0', borderBottom: `1px solid ${C.border}`
        }}>
          <span style={{ ...hb, fontSize: 12 }}>{name}</span>
          <span style={{ ...hb, fontSize: 11, color: ok ? C.green : C.red }}>
            {ok ? '✅ מוגדר' : '❌ חסר'}
          </span>
        </div>
      ))}
      <HR />
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
        <span style={{ ...hb, fontSize: 12 }}>שפה</span>
        <div style={{ display: 'flex', border: `1.5px solid ${C.border}`, borderRadius: 4, overflow: 'hidden' }}>
          {['עברית', 'English'].map((l, i) => (
            <div key={l} style={{
              padding: '3px 10px', ...hb, fontSize: 11, cursor: 'pointer',
              background: i === 0 ? C.blue : C.bg,
              color: i === 0 ? '#fff' : C.muted,
            }}>{l}</div>
          ))}
        </div>
      </div>
      <div style={{
        background: '#fffdf0', border: `1px solid ${C.yellow}70`,
        borderRadius: 4, padding: '7px 10px', marginBottom: 11,
        ...hb, fontSize: 10, color: '#7a6000', lineHeight: 1.55
      }}>
        🔒 המפתחות נשמרים מקומית בדפדפן בלבד.
      </div>
      <WFBtn label="פתח הגדרות מלאות →" full />
    </div>
  );
}

function OptionsPage() {
  return (
    <div style={{ background: C.subtle, padding: '24px 28px', direction: 'rtl', ...hb }}>
      <div style={{ marginBottom: 22 }}>
        <div style={{ fontSize: 20, fontWeight: 700, color: C.ink, marginBottom: 3 }}>⚙️ הגדרות KSP × AI</div>
        <div style={{ fontSize: 12, color: C.muted }}>הגדר מפתחות API ועדפות</div>
      </div>

      {/* API keys card */}
      <div style={{ background: C.bg, borderRadius: 7, border: `1.5px solid ${C.border}`, padding: '16px 18px', marginBottom: 14 }}>
        <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 14 }}>מפתחות API</div>
        {[
          { name: 'Claude (Anthropic)', icon: '🟣', href: 'console.anthropic.com' },
          { name: 'OpenAI / GPT',       icon: '🟢', href: 'platform.openai.com' },
          { name: 'Google Gemini',      icon: '🔵', href: 'aistudio.google.com' },
        ].map(({ name, icon, href }) => (
          <div key={name} style={{ marginBottom: 14 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
              <span style={{ fontSize: 12, fontWeight: 600 }}>{icon} {name}</span>
              <span style={{ fontSize: 10, color: C.blue }}>↗ קבל מפתח ({href})</span>
            </div>
            <WFInput placeholder="sk-..." />
          </div>
        ))}
      </div>

      {/* Preferences card */}
      <div style={{ background: C.bg, borderRadius: 7, border: `1.5px solid ${C.border}`, padding: '16px 18px', marginBottom: 14 }}>
        <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 13 }}>העדפות</div>
        <div style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 5 }}>ספק ברירת מחדל</div>
          <WFSelect label="Claude (Anthropic)" />
        </div>
        <div>
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>שפה</div>
          <div style={{ display: 'flex', gap: 8 }}>
            {['עברית', 'English'].map((l, i) => (
              <div key={l} style={{
                padding: '6px 18px', border: `1.5px solid ${i === 0 ? C.blue : C.border}`,
                borderRadius: 4, fontSize: 12, cursor: 'pointer',
                background: i === 0 ? C.blue + '12' : C.bg,
                color: i === 0 ? C.blue : C.muted
              }}>{l}</div>
            ))}
          </div>
        </div>
      </div>

      {/* Privacy card */}
      <div style={{
        background: '#fffdf0', borderRadius: 7,
        border: `1px solid ${C.yellow}80`, padding: '14px 18px', marginBottom: 20
      }}>
        <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 7 }}>🔒 פרטיות ואבטחה</div>
        <div style={{ fontSize: 11, color: '#6a5900', lineHeight: 1.7 }}>
          המפתחות נשמרים <b>מקומית בדפדפן בלבד</b> (<span style={mono}>chrome.storage.local</span>)
          ואינם נשלחים לשרתינו. הם נשלחים ישירות לספק ה-AI שבחרת בלבד.
        </div>
      </div>

      <WFBtn label="💾 שמור הגדרות" primary full style={{ fontSize: 14, padding: '12px 20px' }} />
      <div style={{ marginTop: 10, textAlign: 'center', fontSize: 11, color: C.green }}>
        ✅ ההגדרות נשמרו!&nbsp;&nbsp;
        <span style={{ color: C.muted }}>(confirmation state)</span>
      </div>
    </div>
  );
}

/* ─── floating button states ─────────────────────────────── */
function FloatBtnDemo({ variant }) {
  const bg = variant === 'hover' ? C.blue : C.ink;
  const label = variant === 'active' ? '⏳ מחלץ...' : '✨ נתח עם AI';
  const shadow = variant === 'hover'
    ? `0 0 0 3px ${C.blue}30, 0 4px 14px rgba(0,0,0,.22)`
    : '0 3px 12px rgba(0,0,0,.25)';
  return (
    <div style={{
      width: '100%', height: '100%',
      background: C.stripe,
      position: 'relative', borderRadius: 4,
    }}>
      {/* simulate a KSP grid row */}
      {[0,1,2].map(i => (
        <div key={i} style={{
          position: 'absolute', top: 12 + i*24, right: 12,
          width: '70%', height: 14, background: '#d8d3cb', borderRadius: 2, opacity: 0.5
        }} />
      ))}
      {/* the button */}
      <div style={{
        position: 'absolute', bottom: 16, left: 16,
        background: bg, color: '#fff', borderRadius: 22,
        padding: '7px 15px', ...hb, fontSize: 12.5, fontWeight: 700,
        boxShadow: shadow, cursor: 'pointer',
        border: variant === 'hover' ? `1.5px solid ${C.blue}` : '1.5px solid transparent',
        display: 'inline-flex', alignItems: 'center', gap: 5
      }}>
        {label}
      </div>
      {/* tooltip */}
      {variant === 'hover' && (
        <div style={{
          position: 'absolute', bottom: 53, left: 16,
          background: C.ink, color: '#fff', borderRadius: 4,
          padding: '4px 9px', ...hb, fontSize: 10.5, whiteSpace: 'nowrap',
          boxShadow: '0 2px 6px rgba(0,0,0,.2)'
        }}>
          לחץ לנתח 3 מוצרים ▲
        </div>
      )}
      {variant === 'active' && (
        <div style={{
          position: 'absolute', bottom: 55, left: 16,
          ...cv, fontSize: 12, color: C.muted
        }}>← spinner here</div>
      )}
      {/* annotation */}
      <div style={{ position: 'absolute', top: 9, left: 9 }}>
        <Note text={
          variant === 'default' ? 'bottom-left · fixed' :
          variant === 'hover'   ? 'blue glow + tooltip' :
                                  'pulse / spinner'
        } />
      </div>
    </div>
  );
}

/* ─── main ───────────────────────────────────────────────── */
function App() {
  return (
    <DesignCanvas>

      {/* ① Floating button */}
      <DCSection id="s1" title="① כפתור צף — Floating In-Page Button" subtitle="Fixed, bottom-left, appears only on KSP grid pages">
        <DCArtboard id="fb-default" label="Default — collapsed" width={240} height={150}>
          <FloatBtnDemo variant="default" />
        </DCArtboard>
        <DCArtboard id="fb-hover" label="Hover — tooltip" width={240} height={150}>
          <FloatBtnDemo variant="hover" />
        </DCArtboard>
        <DCArtboard id="fb-active" label="Active — extracting" width={240} height={150}>

      {/* ④ AI tab states */}

        </DCArtboard>

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
